url: https://epi-interactive-ltd.github.io/toro/

template:
  bootstrap: 5
  css:
    - extras.css

assets:
  - pkgdown/assets
  - vignettes/images

authors:
  Poppy Pakinui:
    href: https://github.com/pakinui
  epi:
    href: https://epi.group/
    html: '<img src="https://github.com/Epi-interactive-Ltd/toro/blob/dev/vignettes/images/epi-logo.png?raw=true" alt="Epi Group" height="25" style="max-height: 25px;">'
  footer:
    roles: [fnd]
    text: 'Funded by'
  sidebar:
    roles: [aut, ctb]
    before: 'So *who* does the work?'
  before: 'This package is proudly brought to you by:'
  after: 'See the [changelog](news/index.html) for other contributors.'

home:
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  links:
    - text: 'Roadmap coming soon! :soon:'
      href: '#'

navbar:
  structure:
    left: [home, reference, articles, examples, news]
    right: [search, github]

  components:
    home:
      icon: fa-home fa-lg
      aria-label: 'Home'
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    examples:
      text: 'Examples'
      href: articles/examples/index.html

reference:
  - title: 'Map Creation'
    desc: 'Function to create maps'
    contents:
      - map
  - title: 'Data Sources'
    desc: 'Functions to interact with map data sources'
    contents:
      - add_source
      - set_source_data
      - add_feature_server_source
      - add_image
  - title: 'Adding Layers'
    desc: 'Functions to add map layers'
    contents:
      - add_layer
      - add_fill_layer
      - add_circle_layer
      - add_line_layer
      - add_symbol_layer
      - add_text_layer
      - add_lat_lng_grid
  - title: 'Updating Layers'
    desc: 'Functions to update map layers'
    contents:
      - show_layer
      - hide_layer
      - toggle_clustering
      - toggle_lat_lng_grid
  - title: 'Layer Styling'
    desc: 'Functions to update map layer styling'
    contents:
      - set_paint_property
      - set_layout_property
  - title: 'Styling Helpers'
    desc: 'Functions to help with map/layer styling'
    contents:
      - get_layout_options
      - get_paint_options
      - get_layer_filter
      - get_column
      - get_column_boolean
      - get_column_group
      - get_column_step_steps
  - title: 'Map Tiles'
    desc: 'Functions to update map tiles'
    contents:
      - set_tile_layer
      - get_tile_options
  - title: 'Map view'
    desc: 'Functions to manipulate the map view'
    contents:
      - set_zoom
      - set_bounds
  - title: 'Map Interaction'
    desc: 'Functions to get information from map interaction'
    contents:
      - get_clicked_feature
      - get_drawn_shape
  - title: 'Controls - Basic'
    desc: 'Simple map controls'
    contents:
      - toggle_control
      - remove_control
  - title: 'Controls - Drawing Tools'
    desc: 'Controls for draw/edit workflows'
    contents:
      - add_draw_control
      - remove_draw_control
      - delete_drawn_shape
  - title: 'Controls - View Tools'
    desc: 'Controls for map view manipulation'
    contents:
      - add_zoom_control
      - remove_zoom_control
  - title: 'Controls - Layer Tools'
    desc: 'Controls for updating map layers'
    contents:
      - add_tile_selector_control
      - remove_tile_selector_control
      - add_layer_selector_control
      - remove_layer_selector_control
      - add_cluster_toggle
      - remove_cluster_toggle
      - add_visibility_toggle
      - remove_visibility_toggle
  - title: 'Controls - Animation Tools'
    desc: 'Controls for performing map animations'
    contents:
      - add_route
      - play_route
      - pause_route
      - remove_route
      - add_timeline_control
      - remove_timeline_control
      - add_speed_control
      - remove_speed_control
  - title: 'Controls — Misc'
    desc: 'Additional interactive controls'
    contents:
      - add_cursor_coords_control
      - remove_cursor_coords_control
      - add_custom_control
      - remove_custom_control
      - add_cluster_toggle
  - title: 'Control Panels'
    desc: 'Functions to add/edit control panels for map interaction'
    contents:
      - add_control_panel
      - add_control_group
      - remove_control_group
      - remove_control_from_panel
  - title: 'Shiny Integration'
    desc: 'Functions to get information from map interaction'
    contents:
      - mapOutput
      - renderMap
      - mapProxy
  - title: 'Extra features'
    desc: 'Additional functions'
    contents:
      - export_map_image
      - save_map_html

articles:
  - title: 'Getting Started'
    contents:
      - articles/getting-started
  - title: 'Integration'
    contents:
      - articles/shiny-integration
  - title: 'Layers'
    contents:
      - articles/layers
      - articles/map-tiles
      - articles/popups
      - articles/map-clusters
  - title: 'Controls'
    contents:
      - articles/controls
      - articles/draw-controls
      - articles/view-controls
  - title: 'Advanced Features'
    contents:
      - articles/animations
  - title: 'Contributing'
    contents:
      - articles/contributing
  - title: 'Examples'
    contents:
      - articles/examples/index
      - articles/examples/sources/add-feature-service-source
      - articles/examples/sources/add-geojson-source
      - articles/examples/sources/add-image-source
      - articles/examples/layers/add-fill-layer
      - articles/examples/layers/add-line-layer
      - articles/examples/layers/add-circle-layer
      - articles/examples/layers/add-symbol-layer
      - articles/examples/layers/add-text-layer
      - articles/examples/layers/lat-lng-grid
